{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Upload Milestone for: {{ project.title }}</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_stage" class="form-label">Project Stage</label>
                        {{ form.stage }}
                    </div>
                    <div class="mb-3">
                        <label for="id_document" class="form-label">Document (PDF/DOC/ZIP)</label>
                        {{ form.document }}
                        {% if form.document.errors %}
                            <div class="text-danger">{{ form.document.errors }}</div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Upload Document</button>
                    <a href="{% url 'student_portal' %}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
